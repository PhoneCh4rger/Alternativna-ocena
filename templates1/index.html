<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zapiski</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
</head>
<body>

    <script>
        function logout() {
            $.ajax({
                'url': '/logout',
                'type': 'GET',
                'success': function(data) {
                    window.location.reload();
                    console.log("Logout success.");
                }
            });
        }

        function dodajZapisek() {
            let naslovBox = document.getElementById('naslov');
            let naslov = naslovBox.value;
            let vsebinavBox = document.getElementById('vsebina');
            let vsebina = vsebinavBox.value;

            $.ajax({
                'url': '/dodaj',
                'type': 'POST',
                'data': {'naslov': naslov, 'vsebina': vsebina},
                'success': function(data) {
                    console.log('Data: ' + data);
                },
                'error': function(request, error) {
                    console.log("Request: " + JSON.stringify(request));
                }
            });
            naslovBox.value = "";
            vsebinavBox.value = "";
            window.location.reload();
        }

        function izbrisiZapisek(naslov) {
            $.ajax({
                'url': '/izbrisi',
                'type': 'POST',
                'data': {'naslov': naslov},
                'success': function(data) {
                    console.log('Data: ' + data);
                },
                'error': function(request, error) {
                    console.log("Request: " + JSON.stringify(request));
                }
            });
            window.location.reload();
        }
    </script>

    <div class="container">
        <h1>Zapiski</h1>
        <h2>Pozdravljen, {{ user }}!</h2>

        <form>
            <textarea name="" id="naslov" placeholder="Naslov..."></textarea>
            <textarea name="" id="vsebina" placeholder="Vsebina..." rows="5"></textarea>
            <button type="button" onclick="dodajZapisek()">Shrani</button>
        </form>

        {% for z in zapiski %}
        <div class="card">
            <h3>{{ z.naslov }}</h3>
            <p class="content">{{ z.vsebina }}</p>
            <button class="delete-btn" onclick="izbrisiZapisek('{{ z.naslov }}')">Izbriši</button>
        </div>
        {% endfor %}
    </div>

    <button id="logout-button" onclick="logout()">Logout</button>

</body>
</html>
