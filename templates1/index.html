<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Zapiski</title>
</head>
<body>

<h1>Zapiski</h1>
<h3>Pozdravljen {{ user }}</h3>

<textarea id="naslov" placeholder="Naslov"></textarea><br>
<textarea id="vsebina" placeholder="Vsebina"></textarea><br>
<button onclick="dodaj()">Shrani</button>

<hr>

{% for z in zapiski %}
<div>
    <b>{{ z.naslov }}</b>
    <p>{{ z.vsebina }}</p>
    <button onclick="izbrisi('{{ z.naslov }}')">Izbriši</button>
</div>
{% endfor %}

<br>
<button onclick="logout()">Logout</button>

<script>
function dodaj() {
    let naslov = document.getElementById("naslov").value;
    let vsebina = document.getElementById("vsebina").value;

    if (naslov == "" || vsebina == "") {
        alert("Izpolni vse");
        return;
    }

    fetch("/dodaj", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "naslov=" + encodeURIComponent(naslov) +
              "&vsebina=" + encodeURIComponent(vsebina)
    })
    .then(() => {
        location.reload();
    });
}

function izbrisi(naslov) {
    fetch("/izbrisi", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "naslov=" + encodeURIComponent(naslov)
    })
    .then(() => {
        location.reload();
    });
}

function logout() {
    window.location.href = "/logout";
}
</script>

</body>
</html>
